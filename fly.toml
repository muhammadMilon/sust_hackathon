# Fly.io config. Run `fly launch --no-deploy` once to claim an app name, then
# `fly deploy`. Adjust app name / region as needed.
app = "queuestorm-ticket-triage"
primary_region = "sin"

[build]

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
